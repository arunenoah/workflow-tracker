<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Tracker - Kanban Dashboard</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/kanban.css">
  <link rel="stylesheet" href="/css/cards.css">
  <link rel="stylesheet" href="/css/modal.css">

  <style>
    /* Smooth scrolling and base styles */
    html {
      scroll-behavior: smooth;
    }

    /* Focus styles for accessibility */
    *:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    /* Disable outline on mouse click (but keep on keyboard) */
    *:focus:not(:focus-visible) {
      outline: none;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-left">
      <div class="navbar-brand">⚙️ Workflow</div>
      <button class="navbar-project-selector">
        <span id="current-project">Loading...</span> ▼
      </button>
    </div>
    <div class="navbar-right">
      <button class="navbar-button" data-action="settings" title="Settings">⚙️ Settings</button>
      <div class="connection-indicator" title="WebSocket connection status"></div>
    </div>
  </nav>

  <!-- Board Container -->
  <div class="board-container">
    <!-- Filters -->
    <div class="board-filters">
      <div class="filter-group">
        <span class="filter-label">Filter:</span>
        <select class="filter-select" id="priority-filter" title="Filter by priority">
          <option value="">All Priorities</option>
          <option value="CRITICAL">🔴 Critical</option>
          <option value="HIGH">🟠 High</option>
          <option value="MEDIUM">🟡 Medium</option>
          <option value="LOW">🔵 Low</option>
        </select>
      </div>
    </div>

    <!-- Kanban Board -->
    <div class="kanban-board">
      <!-- Columns injected by board.js -->
    </div>
  </div>

  <!-- Modal Overlay (for dialogs) -->
  <div class="modal-overlay"></div>

  <!-- Scripts -->
  <script src="/js/api-client.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/cards.js"></script>
  <script src="/js/modals.js"></script>
  <script src="/js/board.js"></script>

  <script>
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[Dashboard] Initializing...');

      // Update project name in navbar
      const updateProjectName = async () => {
        if (Board.currentProject) {
          document.querySelector('#current-project').textContent = Board.currentProject.name;
        }
      };

      // Update on project load
      const originalLoadProject = Board.loadProject.bind(Board);
      Board.loadProject = async function() {
        await originalLoadProject();
        updateProjectName();
      };

      // Priority filter
      const priorityFilter = document.querySelector('#priority-filter');
      if (priorityFilter) {
        priorityFilter.addEventListener('change', async (e) => {
          Board.filter.priority = e.target.value || null;
          await Board.loadProject();
        });
      }

      // Settings button
      const settingsBtn = document.querySelector('[data-action="settings"]');
      if (settingsBtn) {
        settingsBtn.addEventListener('click', () => {
          if (Board.currentProjectId) {
            Modals.openSettings(Board.currentProjectId);
          }
        });
      }
    });
  </script>
</body>
</html>
